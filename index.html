<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinsto</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: min(320px, 80vw);
      height: auto;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 400;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="spinsto-logo-white.png" alt="Spinsto" />
    <!-- <p class="tagline">Coming Soon</p> -->
  </div>
  <footer>&copy; 2026 Spinsto</footer>
</body>
</html>
